name: ALMYO Sunucu Dağıtımı

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: FTP ile Dosya Gönderimi
    runs-on: ubuntu-latest
    
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v3

      - name: Node.js Kur
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Et
        run: |
          npm install
          npm run build

      - name: Sunucuya Aktar (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 91.142.130.114
          username: almyo
          password: altinolukmyo
          local-dir: ./dist/ 
          server-dir: /www/wwwroot/tk/
          # Hataları engellemek için şu ayarları ekliyoruz:
          protocol: ftp
          # Alt klasör oluşturma sorunlarını aşmak için pasif modu ve zaman aşımını yönetir:
          dry-run: false
          dangerous-clean-slate: false